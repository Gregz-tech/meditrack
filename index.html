<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meditrack | Campus Wellness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top bg-white bg-opacity-75" style="backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05);">
        <div class="container">
            <a class="navbar-brand brand-font text-gradient fs-4 fw-bold" href="#/">
                <i class="bi bi-activity"></i> Meditrack
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    
                    <div id="nav-auth-links" class="d-flex align-items-center">
                        <li class="nav-item">
                            <a class="nav-link text-dark fw-medium" href="#/login">Login</a>
                        </li>
                        <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                            <a class="btn btn-primary-mt btn-sm px-4" href="#/roles">Get Started</a>
                        </li>
                    </div>

                    <div id="nav-user-links" class="d-none">
                        <li class="nav-item">
                            <button class="btn btn-outline-danger btn-sm px-3 border-0 fw-bold" id="btn-logout">
                                <i class="bi bi-box-arrow-right me-1"></i> Logout
                            </button>
                        </li>
                    </div>
                    
                </ul>
            </div>
        </div>
    </nav>

    <main id="app-root" class="container mt-5 mb-5 min-vh-100">
        <div class="d-flex justify-content-center align-items-center" style="height: 60vh;">
            <div class="spinner-border" style="color: var(--primary-green);" role="status"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/db.js"></script> <script src="assets/js/router.js"></script>
    <script src="assets/js/app.js"></script>
    
    <script src="assets/js/modules/auth.js"></script>
    <script src="assets/js/modules/bmi.js"></script>
    <script src="assets/js/modules/genotype.js"></script>
    <script src="assets/js/modules/wellness.js"></script>
    <script src="assets/js/modules/history.js"></script>
</body>
</html>
