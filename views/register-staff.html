<div class="container py-4 mb-5 view-enter">
    <div class="row justify-content-center align-items-center">
        
        <div class="col-12 col-md-8 col-lg-6">
            <div class="mb-4">
                <a href="#/roles" class="text-decoration-none text-muted fw-bold hover-bg-light p-2 rounded-3">
                    <i class="bi bi-arrow-left me-1"></i> Back to Roles
                </a>
            </div>

            <div class="mt-card border-0 shadow-lg p-4 p-sm-5 position-relative">
                <div class="position-absolute top-0 start-0 w-100 bg-primary" style="height: 6px; border-radius: 20px 20px 0 0;"></div>
                
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                        <i class="bi bi-person-badge fs-3"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Staff Registration</h3>
                    <p class="text-muted small">Create your FUHSI employee wellness account.</p>
                </div>

                <form id="form_staff_register">
                    
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="staff_name" placeholder="Jane Doe" required>
                        <label for="staff_name">Full Name</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="staff_email" placeholder="name@fuhsi.edu.ng" required>
                        <label for="staff_email">Staff Email Address</label>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="staff_id" placeholder="STF/..." required>
                                <label for="staff_id">Staff ID</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="staff_dept" placeholder="Department" required>
                                <label for="staff_dept">Department / Unit</label>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="staff_password" placeholder="Password" required minlength="8">
                                <label for="staff_password">Password</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="staff_password_confirm" placeholder="Confirm Password" required minlength="8">
                                <label for="staff_password_confirm">Confirm Password</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 mb-3 fs-5 fw-bold" style="border-radius: 12px;">
                        Create Staff Account
                    </button>

                    <div class="text-center">
                        <p class="text-muted small mb-0">Already registered? <a href="#/login" class="text-primary fw-bold text-decoration-none">Log in</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
