<div class="container py-4 mb-5 view-enter">
    <div class="row justify-content-center align-items-center">
        
        <div class="col-12 col-md-8 col-lg-6">
            
            <div class="mb-4">
                <a href="#/roles" class="text-decoration-none text-muted fw-bold hover-bg-light p-2 rounded-3">
                    <i class="bi bi-arrow-left me-1"></i> Back to Roles
                </a>
            </div>

            <div class="mt-card border-0 shadow-lg p-4 p-sm-5 position-relative">
                <div class="position-absolute top-0 start-0 w-100 bg-success" style="height: 6px; border-radius: 20px 20px 0 0;"></div>
                
                <div class="text-center mb-4">
                    <div class="bg-success bg-opacity-10 text-success rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                        <i class="bi bi-mortarboard fs-3"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Student Registration</h3>
                    <p class="text-muted small">Create your FUHSI Meditrack account.</p>
                </div>

                <form id="form_student_register">
                    
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="student_name" placeholder="John Doe" required>
                        <label for="student_name">Full Name</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="student_email" placeholder="name@example.com" required>
                        <label for="student_email">University Email Address</label>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="student_matric" placeholder="FHS/..." required>
                                <label for="student_matric">Matric Number</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <select class="form-select" id="student_dept" aria-label="Department selection" required>
                                    <option value="" selected disabled>Select...</option>
                                    <option value="Information Technology & Health Informatics">Information Technology & Health Informatics</option>
                                    <option value="Audiology">Audiology</option>
                                    <option value="Medicine and Surgery">Medicine and Surgery</option>
                                    <option value="Nursing Sciences">Nursing Sciences</option>
                                    <option value="Physiotherapy">Physiotherapy</option>
                                    <option value="Other">Other...</option>
                                </select>
                                <label for="student_dept">Department</label>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="student_password" placeholder="Password" required minlength="8">
                                <label for="student_password">Password</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="student_password_confirm" placeholder="Confirm Password" required minlength="8">
                                <label for="student_password_confirm">Confirm Password</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" value="" id="student_terms" required>
                        <label class="form-check-label text-muted small" for="student_terms">
                            I understand that Meditrack provides wellness awareness, not medical diagnoses.
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary-mt w-100 py-3 mb-3 fs-5">
                        Create Account
                    </button>

                    <div class="text-center">
                        <p class="text-muted small mb-0">Already have an account? <a href="#/login" class="text-success fw-bold text-decoration-none">Log in</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
