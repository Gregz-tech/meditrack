<div class="container py-4 mb-5 view-enter">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="mt-card border-0 shadow-lg p-4 p-sm-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-gradient">Welcome Back</h2>
                    <p class="text-muted small">Sign in to your Meditrack account</p>
                </div>

                <form id="form_login">
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="login_email" placeholder="name@example.com" required>
                        <label for="login_email">Email Address</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="login_password" placeholder="Password" required>
                        <label for="login_password">Password</label>
                    </div>

                    <button type="submit" class="btn btn-primary-mt w-100 py-3 mb-3 fs-5">
                        Login
                    </button>

                    <div class="text-center">
                        <p class="text-muted small">New to Meditrack? <a href="#/roles" class="text-success fw-bold text-decoration-none">Create Account</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
