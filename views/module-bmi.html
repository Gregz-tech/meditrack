<div class="container py-4 mb-5 view-enter">
    
    <div class="row mb-4 align-items-center mt-2">
        <div class="col-12 d-flex align-items-center gap-3">
            <a href="#/dashboard" class="btn btn-light rounded-circle p-2 shadow-sm text-dark hover-bg-light">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
            <div>
                <h3 class="fw-bold mb-0">BMI Calculator</h3>
                <p class="text-muted small mb-0">Check your Body Mass Index</p>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 mb-4">
            <div class="mt-card border-0 shadow-sm p-4 h-100 position-relative">
                <div class="position-absolute top-0 start-0 w-100 bg-primary" style="height: 5px; border-radius: 20px 20px 0 0;"></div>
                
                <h5 class="fw-bold mb-4"><i class="bi bi-rulers text-primary me-2"></i> Enter your details</h5>
                
                <form id="form_bmi_calc">
                    <label class="form-label text-muted small fw-bold">Weight (Kilograms)</label>
                    <div class="input-group mb-4 shadow-sm rounded-3">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-speedometer2"></i></span>
                        <input type="number" class="form-control border-start-0 py-3" id="bmi_weight" placeholder="e.g. 70" step="0.1" required>
                        <span class="input-group-text bg-light fw-bold">kg</span>
                    </div>

                    <label class="form-label text-muted small fw-bold">Height (Meters)</label>
                    <div class="input-group mb-5 shadow-sm rounded-3">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person-standing"></i></span>
                        <input type="number" class="form-control border-start-0 py-3" id="bmi_height" placeholder="e.g. 1.75" step="0.01" required>
                        <span class="input-group-text bg-light fw-bold">m</span>
                    </div>

                    <button type="submit" class="btn btn-primary-mt w-100 py-3 fs-5 fw-bold shadow-sm">
                        Calculate BMI
                    </button>
                </form>
            </div>
        </div>

        <div class="col-md-6 col-lg-5">
            <div class="mt-card border-0 shadow-sm p-4 h-100 d-flex flex-column justify-content-center text-center text-muted" id="bmi_result_empty">
                <i class="bi bi-activity display-1 opacity-25 mb-3"></i>
                <h5 class="fw-bold">Your Results</h5>
                <p class="small">Enter your weight and height to see your BMI category and wellness advice.</p>
            </div>

            <div class="mt-card border-0 shadow-lg p-4 h-100 text-center d-none" id="bmi_result_card">
                <p class="text-muted fw-bold text-uppercase tracking-wide mb-2">Your Score</p>
                <h1 class="display-2 fw-bolder mb-0" id="bmi_score_display">--</h1>
                
                <div class="my-4">
                    <span class="badge rounded-pill px-4 py-2 fs-6 mb-3" id="bmi_category_badge">Category</span>
                    <p class="text-dark fw-medium mb-0" id="bmi_advice_text">Wellness advice will appear here.</p>
                </div>

                <div class="mt-auto">
                    <button class="btn btn-outline-secondary w-100 fw-bold border-2" id="btn_save_bmi">
                        <i class="bi bi-cloud-arrow-up me-2"></i> Save to History
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
