<div class="container py-4 mb-5 view-enter">
    <div class="row justify-content-center align-items-center">
        
        <div class="col-12 col-md-8 col-lg-6">
            <div class="mb-4 d-flex justify-content-between align-items-center">
                <a href="#/roles" class="text-decoration-none text-muted fw-bold hover-bg-light p-2 rounded-3">
                    <i class="bi bi-arrow-left me-1"></i> Back
                </a>
                <button id="btn_guest_access" class="btn btn-sm btn-outline-secondary rounded-pill px-3 fw-bold">
                    Skip & Use as Guest
                </button>
            </div>

            <div class="mt-card border-0 shadow-lg p-4 p-sm-5 position-relative">
                <div class="position-absolute top-0 start-0 w-100 bg-warning" style="height: 6px; border-radius: 20px 20px 0 0;"></div>
                
                <div class="text-center mb-4">
                    <div class="bg-warning bg-opacity-10 text-warning rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                        <i class="bi bi-globe2 fs-3"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Visitor Registration</h3>
                    <p class="text-muted small">Save your wellness checks securely.</p>
                </div>

                <form id="form_visitor_register">
                    
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="visitor_name" placeholder="John Doe" required>
                        <label for="visitor_name">Full Name</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="visitor_email" placeholder="name@example.com" required>
                        <label for="visitor_email">Email Address</label>
                    </div>

                    <div class="form-floating mb-3">
                        <select class="form-select" id="visitor_status" required>
                            <option value="" selected disabled>Select status...</option>
                            <option value="student">Yes, I am a student</option>
                            <option value="non_student">No, I am not a student</option>
                        </select>
                        <label for="visitor_status">Are you currently a student?</label>
                    </div>

                    <div id="school_name_container" class="form-floating mb-3 d-none">
                        <input type="text" class="form-control" id="visitor_school" placeholder="School Name">
                        <label for="visitor_school">Name of Institution</label>
                    </div>

                    <div id="occupation_container" class="form-floating mb-3 d-none">
                        <input type="text" class="form-control" id="visitor_occupation" placeholder="Occupation">
                        <label for="visitor_occupation">Occupation</label>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="visitor_password" placeholder="Password" required minlength="8">
                                <label for="visitor_password">Password</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="visitor_password_confirm" placeholder="Confirm Password" required minlength="8">
                                <label for="visitor_password_confirm">Confirm Password</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-warning w-100 py-3 mb-3 fs-5 fw-bold text-dark" style="border-radius: 12px;">
                        Create Visitor Account
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
